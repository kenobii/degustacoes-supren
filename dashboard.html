<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supren Veg — Dashboard de Degustações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        h1, h2, h3 { font-family: 'DM Serif Display', serif; }

        /* Header */
        header {
            background-color: #1B5E20;
            color: white;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header-brand { font-family: 'DM Serif Display', serif; font-size: 1.6rem; }
        .header-nav { display: flex; gap: 1rem; }

        .btn-nav {
            display: inline-block;
            padding: 0.5rem 1.1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            background: transparent;
            cursor: pointer;
        }

        .btn-nav:hover { background: rgba(255,255,255,0.15); border-color: white; }
        .btn-nav.active { background: white; color: #1B5E20; border-color: white; }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
            color: white;
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
        }

        .hero h1 { font-size: 2rem; font-weight: 400; margin-bottom: 0.4rem; }
        .hero p { opacity: 0.9; font-size: 0.95rem; }

        /* Filter bar */
        .filter-bar {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 0.9rem 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            white-space: nowrap;
        }

        .filter-select {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0.35rem 0.7rem;
            font-size: 0.88rem;
            font-family: 'DM Sans', sans-serif;
            background: white;
            cursor: pointer;
            color: #333;
        }

        .filter-select:focus { outline: none; border-color: #2E7D32; }

        .filter-pills {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .pill {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
            background: #f0f0f0;
            color: #555;
        }

        .pill:hover { background: #e0e0e0; }

        .pill.active {
            color: white;
            border-color: transparent;
        }

        .pill[data-status="Todos"].active        { background: #1B5E20; }
        .pill[data-status="Concluído"].active    { background: #388E3C; }
        .pill[data-status="Finalizado"].active   { background: #1B5E20; }
        .pill[data-status="Confirmado"].active   { background: #1565C0; }
        .pill[data-status="Agendado"].active     { background: #E65100; }

        .filter-count {
            margin-left: auto;
            font-size: 0.85rem;
            color: #888;
            white-space: nowrap;
        }

        /* Main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            border-left: 4px solid;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .kpi-card .kpi-label {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
        }

        .kpi-card .kpi-value {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
            font-family: 'DM Serif Display', serif;
        }

        .kpi-card .kpi-sub {
            font-size: 0.82rem;
            opacity: 0.55;
        }

        .kpi-total      { border-color: #1B5E20; }
        .kpi-total .kpi-value { color: #1B5E20; }

        .kpi-concluido  { border-color: #4CAF50; }
        .kpi-concluido .kpi-value { color: #388E3C; }

        .kpi-finalizado { border-color: #1B5E20; }
        .kpi-finalizado .kpi-value { color: #1B5E20; }

        .kpi-confirmado { border-color: #2196F3; }
        .kpi-confirmado .kpi-value { color: #1565C0; }

        .kpi-agendado   { border-color: #FF9800; }
        .kpi-agendado .kpi-value { color: #E65100; }

        /* Charts grid */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .chart-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }

        .chart-card h3 {
            font-size: 1rem;
            color: #1B5E20;
            margin-bottom: 1.2rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }

        .chart-wrapper { position: relative; height: 260px; }
        .chart-wrapper-tall { position: relative; height: 320px; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #aaa;
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.82rem;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .charts-grid { grid-template-columns: 1fr; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .hero h1 { font-size: 1.5rem; }
            .filter-bar { padding: 0.9rem 1rem; gap: 0.8rem; }
            .filter-count { width: 100%; }
        }
    </style>
</head>

<div class="container">

    <!-- Linha 1: Donut + Por Mês -->
    <div class="charts-grid">

            <h3>Distribuição por Status</h3>
            <div class="chart-wrapper">
                <canvas id="chartStatus"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Degustações por Mês</h3>
            <div class="chart-wrapper">
                <canvas id="chartMes"></canvas>
            </div>
        </div>
    </div>

    <!-- Linha 2: Por Degustador + Por Kit -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>Atribuições por Degustador</h3>
            <div class="chart-wrapper-tall">
                <canvas id="chartDegustador"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Uso por Kit</h3>
            <div class="chart-wrapper">
                <canvas id="chartKit"></canvas>
            </div>
        </div>
    </div>

</div>

<footer>

// ── Estado dos filtros ─────────────────────────────────────────────────────────

const filtros = { period: 'all', status: 'Todos' };

// ── Utilitários ────────────────────────────────────────────────────────────────

function nomeMes(isoDate) {
    if (!isoDate) return 'Sem data';
    const d = new Date(isoDate + 'T12:00:00');
    return d.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' })
            .replace('.', '').replace(' de ', '/');
}

function getFiltered() {
    const now = new Date();
    let dados = TODAS_DEGUSTACOES;

    if (filtros.period !== 'all') {
        const meses = { 'thismonth': 0, '3m': 3, '6m': 6, '12m': 12 };
        const n = meses[filtros.period];
        let inicio;
        if (filtros.period === 'thismonth') {
            inicio = new Date(now.getFullYear(), now.getMonth(), 1);
        } else {
            inicio = new Date(now);
            inicio.setMonth(inicio.getMonth() - n);
        }
        dados = dados.filter(d => {
            if (!d.data) return false;
            return new Date(d.data + 'T12:00:00') >= inicio;
        });
    }

    if (filtros.status !== 'Todos') {
        dados = dados.filter(d => d.status === filtros.status);
    }

    return dados;
}

// ── KPIs ──────────────────────────────────────────────────────────────────────

function renderKPIs(dados) {
    const total      = dados.length;
    const concluido  = dados.filter(d => d.status === 'Concluído').length;
    const finalizado = dados.filter(d => d.status === 'Finalizado').length;
    const confirmado = dados.filter(d => d.status === 'Confirmado').length;
    const agendado   = dados.filter(d => d.status === 'Agendado').length;
    const pctConc    = total ? Math.round(100 * (concluido + finalizado) / total) : 0;

    const kpis = [
        { cls: 'kpi-total',      label: 'Total',       value: total,      sub: 'degustações no período' },
        { cls: 'kpi-concluido',  label: 'Concluído',   value: concluido,  sub: 'realizado recentemente' },
        { cls: 'kpi-finalizado', label: 'Finalizado',  value: finalizado, sub: `${pctConc}% do total realizados` },
        { cls: 'kpi-confirmado', label: 'Confirmadas', value: confirmado, sub: 'prontas para acontecer' },
        { cls: 'kpi-agendado',   label: 'Agendadas',   value: agendado,   sub: 'aguardando confirmação' },
    ];

    document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
        <div class="kpi-card ${k.cls}">
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-value">${k.value}</div>
            <div class="kpi-sub">${k.sub}</div>
        </div>
    `).join('');

    document.getElementById('filterCount').textContent =
        `${total} de ${TODAS_DEGUSTACOES.length} degustações`;
}

// ── Instâncias dos gráficos ───────────────────────────────────────────────────

const charts = {};

function updateChart(id, type, data, options) {
    if (charts[id]) {
        charts[id].data = data;
        charts[id].options = { ...charts[id].options, ...options };
        charts[id].update();
    } else {
        charts[id] = new Chart(document.getElementById(id), { type, data, options });
    }
}

// ── Gráfico: Status ────────────────────────────────────────────────────────────

function renderChartStatus(dados) {
    const statusLabels = ['Concluído', 'Finalizado', 'Confirmado', 'Agendado'];
    const statusColors = ['#4CAF50', '#1B5E20', '#2196F3', '#FF9800'];
    const values = statusLabels.map(s => dados.filter(d => d.status === s).length);
    const total = dados.length;

    updateChart('chartStatus', 'doughnut', {
        labels: statusLabels,
        datasets: [{ data: values, backgroundColor: statusColors, borderWidth: 2, borderColor: '#fff' }]
    }, {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { position: 'bottom', labels: { padding: 16, font: { family: 'DM Sans' } } },
            tooltip: {
                callbacks: {
                    label: ctx => ` ${ctx.label}: ${ctx.raw} (${total ? Math.round(100 * ctx.raw / total) : 0}%)`
                }
            }
        },
        cutout: '62%'
    });
}

// ── Gráfico: Por Mês ───────────────────────────────────────────────────────────

function renderChartMes(dados) {
    const meses = {};
    dados.forEach(d => {
        const m = nomeMes(d.data);
        meses[m] = (meses[m] || 0) + 1;
    });

    const labels = Object.keys(meses);
    const values = Object.values(meses);

    updateChart('chartMes', 'bar', {
        labels,
        datasets: [{
            label: 'Degustações',
            data: values,
            backgroundColor: '#2E7D32cc',
            borderColor: '#1B5E20',
            borderWidth: 2,
            borderRadius: 6,
        }]
    }, {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, font: { family: 'DM Sans' } }, grid: { color: '#f0f0f0' } },
            x: { ticks: { font: { family: 'DM Sans' } }, grid: { display: false } }
        }
    });
}

// ── Gráfico: Por Degustador ────────────────────────────────────────────────────

function renderChartDegustador(dados) {
    const contagem = {};
    dados.forEach(d => {
        if (!d.degustador) return;
        d.degustador.split(',').forEach(nome => {
            const n = nome.trim();
            if (n) contagem[n] = (contagem[n] || 0) + 1;
        });
    });

    const sorted = Object.entries(contagem).sort((a, b) => b[1] - a[1]);
    const labels = sorted.map(e => e[0]);
    const values = sorted.map(e => e[1]);
    const cores = ['#1B5E20','#2E7D32','#388E3C','#43A047','#4CAF50','#66BB6A','#81C784','#A5D6A7'];

    updateChart('chartDegustador', 'bar', {
        labels,
        datasets: [{
            label: 'Degustações',
            data: values,
            backgroundColor: labels.map((_, i) => cores[i % cores.length]),
            borderRadius: 6,
        }]
    }, {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
            x: { beginAtZero: true, ticks: { stepSize: 1, font: { family: 'DM Sans' } }, grid: { color: '#f0f0f0' } },
            y: { ticks: { font: { family: 'DM Sans', size: 13 } }, grid: { display: false } }
        }
    });
}

// ── Gráfico: Por Kit ───────────────────────────────────────────────────────────

function renderChartKit(dados) {
    const kits = {};
    dados.forEach(d => {
        const k = d.kit || 'Não definido';
        kits[k] = (kits[k] || 0) + 1;
    });

    const labels = Object.keys(kits).sort();
    const values = labels.map(k => kits[k]);
    const kitCores = ['#1565C0','#1976D2','#1E88E5','#42A5F5','#90CAF9'];

    updateChart('chartKit', 'bar', {
        labels,
        datasets: [{
            label: 'Usos',
            data: values,
            backgroundColor: labels.map((_, i) => kitCores[i % kitCores.length]),
            borderRadius: 6,
        }]
    }, {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, font: { family: 'DM Sans' } }, grid: { color: '#f0f0f0' } },
            x: { ticks: { font: { family: 'DM Sans' } }, grid: { display: false } }
        }
    });
}

// ── Render completo ────────────────────────────────────────────────────────────

function renderAll() {
    const dados = getFiltered();
    renderKPIs(dados);
    renderChartStatus(dados);
    renderChartMes(dados);
    renderChartDegustador(dados);
    renderChartKit(dados);
}

// ── Filtros: eventos ───────────────────────────────────────────────────────────

document.getElementById('filterPeriod').addEventListener('change', e => {
    filtros.period = e.target.value;
    renderAll();
});

document.getElementById('statusPills').addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    filtros.status = pill.dataset.status;
    renderAll();
});

// ── Init ───────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
    const total = TODAS_DEGUSTACOES.length;
    const datas = TODAS_DEGUSTACOES.map(d => d.data).filter(Boolean).sort();
    const inicio = datas[0] ? new Date(datas[0] + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
    const fim    = datas[datas.length - 1] ? new Date(datas[datas.length - 1] + 'T12:00:00').toLocaleDateString('pt-BR') : '—';

    document.getElementById('heroSub').textContent =
        total ? `${total} degustações no histórico · ${inicio} a ${fim}` : 'Nenhuma degustação carregada';

    const syncMatch = document.body.innerHTML.match(/Última sincronização: ([^\n<]+)/);
    if (syncMatch) document.getElementById('lastUpdate').textContent = 'Sincronizado em: ' + syncMatch[1].trim();

    if (total === 0) return;

    renderAll();
});
</script>

</body>
</html>
